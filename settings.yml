trading:
  mode: alert_only
  timeframe: 1 hour

ib:
  host: 127.0.0.1
  port: 7497
  client_id: 1

telegram:
  enabled: true
  max_retries: 3
  retry_delay_seconds: 2
  timeout_seconds: 10

instrument:
  asset_class: null
  symbol: null
  exchange: null
  currency: USD
  expiry: null

risk:
  initial_capital: 1000
  capital_slots: 10
  max_concurrent_position_slots: 1

logger:
  file_path: logs/bot.log
  level: INFO
  format: "%(asctime)s %(levelname)s [%(name)s] %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"

paths:
  state_file: bot_state.json
  trade_journal_file: trade_journal.csv
