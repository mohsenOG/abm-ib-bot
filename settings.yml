trading:
  mode: alert_only
  timeframe: 1 hour
  allowed_directions:
    long: true
    short: true

ib:
  host: 127.0.0.1
  port: 7497
  client_id: 1

telegram:
  enabled: true
  max_retries: 3
  retry_delay_seconds: 2
  timeout_seconds: 10

signal_instrument:
  asset_class: CMDTY
  symbol: XAUUSD
  exchange: SMART
  currency: USD
  expiry: null

risk:
  initial_capital: 1000
  capital_slots: 10
  max_concurrent_position_slots: 1

strategy:
  bias_threshold: 0.2
  use_heikin_ashi: true
  atr_length: 14
  sl_atr_mult: 1.0
  tp_atr_mult: 2.0

runtime:
  poll_seconds: 300

live:
  enabled: false
  allow_telegram_failure: false

logger:
  file_path: logs/bot.log
  level: INFO
  format: "%(asctime)s %(levelname)s [%(name)s] %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"

paths:
  state_file: bot_state.json
  trade_journal_file: trade_journal.csv
