trading:
  mode: alert_only
  allowed_directions:
    long: true
    short: true

market_data:
  bar_size: 1 hour
  historical_duration: 30 D
  what_to_show: MIDPOINT
  use_rth: false
  gap_block_recent_bars: 25
  gap_backfill_duration: "1 D"

ib:
  host: 127.0.0.1
  port: 7497
  client_id: 1

telegram:
  enabled: true
  max_retries: 3
  retry_delay_seconds: 2
  timeout_seconds: 10
  require_critical_delivery: true

signal_instrument:
  asset_class: CMDTY
  symbol: XAUUSD
  exchange: SMART
  currency: USD
  expiry: null

execution:
  products_file: execution_products.json
  entry_order_type: market
  entry_fill_timeout_seconds: 60
  protective_submit_timeout_seconds: 10
  status_poll_seconds: 0.25
  quote_poll_seconds: 0.25

sizing:
  min_quantity: 1
  quantity_step: 1
  allow_fractional: false

risk:
  initial_capital: 1000
  capital_slots: 10
  max_concurrent_position_slots: 1

strategy:
  bias_threshold: 0.2
  use_heikin_ashi: true
  atr_length: 14
  sl_atr_mult: 1.0
  tp_atr_mult: 2.0

health:
  market_data_max_age_seconds: 7200
  last_processed_candle_max_age_seconds: 10800
  repeated_error_limit: 3

runtime:
  candle_close_buffer_seconds: 5
  bar_retry_seconds: 15
  bar_retry_attempts: 12
  clock_advisory_enabled: true
  clock_advisory_warn_ms: 5000
  active_trade_monitor_seconds: 10

live:
  enabled: false
  allow_telegram_failure: false

logger:
  file_path: logs/bot.log
  level: INFO
  format: "%(asctime)s %(levelname)s [%(name)s] %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"

paths:
  state_file: bot_state.json
  trade_journal_file: trade_journal.csv
